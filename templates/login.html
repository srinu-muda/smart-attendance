<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,
                                  initial-scale=1.0"/>
  <title>Login — Smart Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #1F3A8A, #1ABC9C);
      min-height: 100vh;
      display: flex; align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      padding: 40px; width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo h2 {
      color: #1F3A8A; font-weight: 700; font-size: 1.4rem;
    }
    .login-logo p { color: #777; font-size: 0.85rem; }
    .form-control:focus {
      border-color: #1F3A8A;
      box-shadow: 0 0 0 3px rgba(31,58,138,0.15);
    }
    .btn-login {
      background: #1F3A8A; color: #fff; border: none;
      width: 100%; padding: 12px; border-radius: 8px;
      font-weight: 600; font-size: 1rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2E75B6; }
    .alert-error {
      background: #FEE; border: 1px solid #FCC;
      color: #C00; padding: 10px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.5rem">🎓</div>
      <h2>Smart AI Attendance</h2>
      <p>SVNIT Surat — Faculty Login</p>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label fw-600"
               style="color:#1F3A8A">Username</label>
        <input type="text" name="username"
               class="form-control" required
               placeholder="Enter your username"
               autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600"
               style="color:#1F3A8A">Password</label>
        <input type="password" name="password"
               class="form-control" required
               placeholder="Enter your password"/>
      </div>
      <button type="submit" class="btn-login">
        Login →
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">
        Default: admin / admin123
      </small>
    </div>
  </div>
</body>
</html>
